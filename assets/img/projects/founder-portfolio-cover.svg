<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Founder Portfolio cover</title>
  <desc id="desc">A stylized browser window showing the ZyInnova founder portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061427"/>
      <stop offset="1" stop-color="#0e3154"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2138"/>
      <stop offset="1" stop-color="#148af9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".4"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="245" fill="#148af9" opacity=".12"/>
  <circle cx="95" cy="690" r="280" fill="#62d7ff" opacity=".07"/>
  <g filter="url(#shadow)">
    <rect x="100" y="88" width="1080" height="544" rx="28" fill="#081a2e" stroke="#fff" stroke-opacity=".16"/>
    <rect x="100" y="88" width="1080" height="58" rx="28" fill="#102f4d"/>
    <circle cx="142" cy="117" r="8" fill="#ff6b6b"/>
    <circle cx="170" cy="117" r="8" fill="#ffd166"/>
    <circle cx="198" cy="117" r="8" fill="#31d07f"/>
    <rect x="255" y="103" width="680" height="28" rx="14" fill="#061427"/>
    <text x="595" y="123" text-anchor="middle" fill="#9db4ca" font-family="Arial, sans-serif" font-size="14">portfolio.zyinnova.com</text>
    <rect x="100" y="146" width="1080" height="486" fill="url(#hero)" opacity=".82"/>
    <rect x="100" y="146" width="1080" height="486" fill="#061427" opacity=".35"/>
    <text x="175" y="300" fill="#eaf2ff" font-family="Arial, sans-serif" font-size="68" font-weight="700">Ziyaaddin Yaramis</text>
    <text x="178" y="360" fill="#d6e3f2" font-family="Arial, sans-serif" font-size="30">Software Developer • Founder of ZyInnova</text>
    <text x="178" y="410" fill="#62d7ff" font-family="Arial, sans-serif" font-size="24">Verified projects, experience and CVs</text>
    <g transform="translate(178 475)">
      <rect width="180" height="52" rx="26" fill="#148af9"/>
      <text x="90" y="34" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="700">View projects</text>
      <rect x="198" width="180" height="52" rx="26" fill="none" stroke="#eaf2ff" stroke-opacity=".55"/>
      <text x="288" y="34" text-anchor="middle" fill="#eaf2ff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Download CV</text>
    </g>
    <text x="1040" y="585" text-anchor="end" fill="#eaf2ff" font-family="Arial, sans-serif" font-size="32" font-weight="700">ZyInnova</text>
  </g>
</svg>
